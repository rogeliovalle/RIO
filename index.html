<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AutoLog V13.1 - Barcode</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        :root { --blue: #0A84FF; --bg: #000; --card: #1C1C1E; --red: #FF453A; --gray: #8E8E93; --green: #32D74B; --accent: #BF5AF2; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; }
        .screen { display: none; padding: 20px; min-height: 100vh; box-sizing: border-box; flex-direction: column; }
        .active { display: flex; }
        
        .btn { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-size: 17px; font-weight: 600; margin: 8px 0; }
        .btn-scanner { background: var(--accent); } 
        .btn-cancel { background: #333; color: var(--red); }
        
        input, textarea { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #1c1c1e; color: white; font-size: 16px; box-sizing: border-box; }
        
        /* Contenedor del Lector de Barras mejorado */
        #reader { 
            width: 100%; 
            border-radius: 20px; 
            overflow: hidden; 
            background: #111; 
            border: 2px dashed var(--accent); 
            margin: 10px 0;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #111; padding: 12px; border-radius: 15px; max-height: 140px; overflow-y: auto; }
        .item { background: #333; padding: 14px 0; text-align: center; border-radius: 10px; font-size: 14px; font-weight: bold; }
        .item.selected { background: var(--accent); border: 2px solid white; }
        
        #final-code { font-size: 38px; font-weight: 800; color: var(--red); text-align: center; padding: 10px; border: 2px solid var(--red); border-radius: 18px; margin: 10px 0; background: #000; }
        .load-card { background: var(--card); padding: 18px; border-radius: 22px; margin-bottom: 15px; border-left: 6px solid var(--accent); }
    </style>
</head>
<body>

    <div id="scr-home" class="screen active">
        <h1 style="margin-top: 40px; color: var(--accent);">AutoLog V13.1</h1>
        <p style="color: var(--gray);">Escáner de Barras Especializado</p>
        <div style="margin-top: auto;">
            <button class="btn btn-scanner" onclick="ir('scr-setup')">+ Iniciar Nueva Carga</button>
            <button class="btn btn-cancel" onclick="ir('scr-history')">🔍 Ver Historial</button>
        </div>
    </div>

    <div id="scr-setup" class="screen">
        <h2>Datos de Carga</h2>
        <input type="text" id="inspector" placeholder="Inspector">
        <input type="text" id="operador" placeholder="Operador">
        <input type="text" id="eco" placeholder="Número ECO">
        <button class="btn btn-scanner" onclick="iniciarCarga()">Confirmar</button>
    </div>

    <div id="scr-vin" class="screen">
        <h2 style="color: var(--accent)">Escaneo de VIN</h2>
        <p style="font-size:12px; color:var(--gray)">Si la cámara no inicia sola, presiona el botón morado.</p>
        
        <div id="reader">
            <p id="reader-msg" style="color:var(--gray); text-align:center; padding:20px;">Cámara inactiva</p>
        </div>
        
        <button id="start-btn" class="btn btn-scanner" onclick="activarCamara()">📸 ENCENDER ESCÁNER</button>
        
        <input type="text" id="vin-input" placeholder="VIN detectado aparecerá aquí">
        
        <button class="btn" onclick="abrirInspeccion()">Siguiente: Capturar Daños</button>
        <button class="btn btn-cancel" onclick="detenerEscanerYVolver()">Volver</button>
    </div>

    <div id="scr-inspect" class="screen">
        <div id="final-code">00-00-0</div>
        <div class="grid" id="grid-p"></div>
        <div class="grid" id="grid-d"></div>
        <div class="grid" id="grid-s"></div>
        <textarea id="comentarios" placeholder="Notas..."></textarea>
        <button class="btn btn-scanner" onclick="guardarDano(false)">➕ Guardar Daño</button>
        <button class="btn" style="background:#222; border:1px solid var(--accent)" onclick="siguienteVin()">🏁 Siguiente VIN</button>
    </div>

    <div id="scr-history" class="screen">
        <button class="btn" onclick="ir('scr-home')">Volver</button>
        <div id="lista-cargas"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }

        let p="00", d="00", s="0";
        let carga = { insp: "", op: "", eco: "" };
        let html5QrCode;

        function ir(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'scr-inspect') generarGrillas();
            if(id === 'scr-history') mostrarHistorial();
        }

        function iniciarCarga() {
            carga.insp = document.getElementById('inspector').value;
            carga.op = document.getElementById('operador').value;
            carga.eco = document.getElementById('eco').value;
            ir('scr-vin');
        }

        // --- MOTOR DE ESCANEO REFORZADO ---
        function activarCamara() {
            const readerDiv = document.getElementById('reader');
            const startBtn = document.getElementById('start-btn');
            
            readerDiv.innerHTML = ""; // Limpia mensaje previo
            
            if(!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            
            const config = { 
                fps: 15, 
                qrbox: { width: 280, height: 120 }, // Cuadro alargado para códigos de barras de VIN
                aspectRatio: 1.0 
            };
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                (decodedText) => {
                    document.getElementById('vin-input').value = decodedText.toUpperCase();
                    if (navigator.vibrate) navigator.vibrate(100); // Vibra al detectar
                    detenerEscaner();
                },
                (errorMessage) => {
                    // Ignoramos errores de "no se detectó código" para no saturar
                }
            ).then(() => {
                startBtn.style.display = 'none'; // Oculta botón si la cámara inició bien
            }).catch(err => {
                readerDiv.innerHTML = `<p style='padding:20px; color:var(--red); font-size:12px;'>Error: ${err}. <br>Asegúrate de permitir el acceso a la cámara en los ajustes del navegador.</p>`;
            });
        }

        function detenerEscaner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('start-btn').style.display = 'block';
                    document.getElementById('reader').innerHTML = "<p style='color:var(--gray);'>Cámara detenida</p>";
                }).catch(err => console.log(err));
            }
        }

        function detenerEscanerYVolver() {
            detenerEscaner();
            ir('scr-home');
        }

        function abrirInspeccion() {
            detenerEscaner();
            ir('scr-inspect');
        }

        // Grillas y Lógica de datos (Igual a la anterior)
        function generarGrillas() {
            const r = (id, max, cb) => {
                const el = document.getElementById(id); el.innerHTML = "";
                for(let i=1; i<=max; i++) {
                    let b = document.createElement('div'); b.className='item'; b.innerText=i;
                    b.onclick = () => { el.querySelectorAll('.item').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); cb(i); };
                    el.appendChild(b);
                }
            };
            r('grid-p', 99, v => { p = v.toString().padStart(2,'0'); act(); });
            r('grid-d', 32, v => { d = v.toString().padStart(2,'0'); act(); });
            r('grid-s', 6, v => { s = v; act(); });
        }
        function act() { document.getElementById('final-code').innerText = `${p}-${d}-${s}`; }

        function guardarDano(silencioso) {
            const cod = document.getElementById('final-code').innerText;
            const res = { vin: document.getElementById('vin-input').value, cod: cod, nota: document.getElementById('comentarios').value, sev: s };
            let db = JSON.parse(localStorage.getItem('autolog_v13_db') || '[]');
            db.push({ eco: carga.eco, fecha: new Date().toLocaleDateString(), danos: [res] });
            localStorage.setItem('autolog_v13_db', JSON.stringify(db));
            if(!silencioso) alert("✅ Guardado");
            p="00"; d="00"; s="0"; act(); generarGrillas();
        }

        function siguienteVin() {
            guardarDano(true);
            document.getElementById('vin-input').value = "";
            ir('scr-vin');
        }

        function mostrarHistorial() {
            const cont = document.getElementById('lista-cargas'); cont.innerHTML = "";
            let db = JSON.parse(localStorage.getItem('autolog_v13_db') || '[]');
            db.reverse().forEach(c => {
                cont.innerHTML += `<div class="load-card"><b>ECO: ${c.eco}</b> | VIN: ${c.danos[0].vin}</div>`;
            });
        }
    </script>
</body>
</html>
