<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AutoLog Barcode V13</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --blue: #0A84FF; --bg: #000; --card: #1C1C1E; --red: #FF453A; --gray: #8E8E93; --green: #32D74B; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
        .screen { display: none; padding: 20px; min-height: 100vh; box-sizing: border-box; flex-direction: column; }
        .active { display: flex; }
        .btn { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-size: 17px; font-weight: 600; margin: 8px 0; }
        .btn-cancel { background: #333; color: var(--red); }
        input, textarea { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #1c1c1e; color: white; font-size: 16px; box-sizing: border-box; }
        
        /* Contenedor del Escáner */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #111; margin-bottom: 10px; border: 2px solid #333; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #111; padding: 12px; border-radius: 15px; max-height: 140px; overflow-y: auto; }
        .item { background: #333; padding: 14px 0; text-align: center; border-radius: 10px; font-size: 14px; font-weight: bold; }
        .item.selected { background: var(--blue); border: 2px solid white; }
        #final-code { font-size: 38px; font-weight: 800; color: var(--red); text-align: center; padding: 10px; border: 2px solid var(--red); border-radius: 18px; margin: 10px 0; background: #000; }
        .load-card { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 15px; border-left: 6px solid var(--blue); }
    </style>
</head>
<body>

    <div id="scr-home" class="screen active">
        <h1 style="margin-top: 40px;">AutoLog V13</h1>
        <p style="color: var(--gray);">Escáner de Código de Barras</p>
        <div style="margin-top: auto;">
            <button class="btn" onclick="nuevaCarga()">+ Iniciar Nueva Carga</button>
            <button class="btn btn-cancel" style="color:white" onclick="ir('scr-history')">🔍 Historial</button>
        </div>
    </div>

    <div id="scr-setup" class="screen">
        <h2>Configuración</h2>
        <input type="text" id="inspector" placeholder="Inspector">
        <input type="text" id="operador" placeholder="Operador">
        <input type="text" id="eco" placeholder="Número ECO">
        <button class="btn" onclick="iniciarCarga()">Confirmar</button>
    </div>

    <div id="scr-vin" class="screen">
        <h2>Escanear VIN</h2>
        <p style="font-size:12px; color:var(--gray)">Apunta al código de barras (puerta o tablero)</p>
        
        <div id="reader"></div>
        
        <input type="text" id="vin-input" placeholder="O escribe VIN manual">
        <button class="btn" onclick="abrirInspeccion()">Capturar Daños</button>
        <button class="btn btn-cancel" onclick="detenerEscaner()">Cerrar Cámara</button>
    </div>

    <div id="scr-inspect" class="screen">
        <div id="final-code">00-00-0</div>
        <div class="grid" id="grid-p"></div><div class="grid" id="grid-d"></div><div class="grid" id="grid-s"></div>
        <textarea id="comentarios" placeholder="Notas..."></textarea>
        <button class="btn" style="background:var(--green)" onclick="guardarDano(false)">➕ Guardar Daño</button>
        <button class="btn" style="background:#222; border:1px solid var(--blue)" onclick="siguienteVin()">🏁 Siguiente VIN</button>
    </div>

    <div id="scr-history" class="screen">
        <button class="btn" onclick="ir('scr-home')">Volver</button>
        <div id="lista-cargas"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }

        let p="00", d="00", s="0";
        let carga = { insp: "", op: "", eco: "" };
        let html5QrCode;

        function ir(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'scr-vin') iniciarEscaner();
            if(id === 'scr-inspect') generarGrillas();
            if(id === 'scr-history') mostrarHistorial();
        }

        function nuevaCarga() { ir('scr-setup'); }
        function iniciarCarga() { 
            carga.insp = document.getElementById('inspector').value;
            carga.op = document.getElementById('operador').value;
            carga.eco = document.getElementById('eco').value;
            ir('scr-vin'); 
        }

        // --- LÓGICA DEL ESCÁNER ---
        function iniciarEscaner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 300, height: 150 } }; // Formato alargado para VIN
            
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                document.getElementById('vin-input').value = decodedText.toUpperCase();
                detenerEscaner();
                // Opcional: Vibrar al detectar
                if (navigator.vibrate) navigator.vibrate(100);
            });
        }

        function detenerEscaner() {
            if (html5QrCode) {
                html5QrCode.stop().catch(err => console.log(err));
            }
        }

        function abrirInspeccion() {
            if(!document.getElementById('vin-input').value) return alert("Falta VIN");
            detenerEscaner();
            ir('scr-inspect');
        }

        // Grillas y Guardado (Igual que antes)
        function generarGrillas() {
            const r = (id, max, cb) => {
                const el = document.getElementById(id); el.innerHTML = "";
                for(let i=1; i<=max; i++) {
                    let b = document.createElement('div'); b.className='item'; b.innerText=i;
                    b.onclick = () => { el.querySelectorAll('.item').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); cb(i); };
                    el.appendChild(b);
                }
            };
            r('grid-p', 99, v => { p = v.toString().padStart(2,'0'); act(); });
            r('grid-d', 32, v => { d = v.toString().padStart(2,'0'); act(); });
            r('grid-s', 6, v => { s = v; act(); });
        }
        function act() { document.getElementById('final-code').innerText = `${p}-${d}-${s}`; }

        function guardarDano(silencioso) {
            const cod = document.getElementById('final-code').innerText;
            const res = { vin: document.getElementById('vin-input').value, cod: cod, nota: document.getElementById('comentarios').value, sev: s };
            let db = JSON.parse(localStorage.getItem('autolog_barcode') || '[]');
            db.push({ eco: carga.eco, fecha: new Date().toLocaleDateString(), danos: [res] });
            localStorage.setItem('autolog_barcode', JSON.stringify(db));
            if(!silencioso) alert("Guardado");
            p="00"; d="00"; s="0"; act(); generarGrillas();
        }

        function siguienteVin() {
            guardarDano(true);
            document.getElementById('vin-input').value = "";
            ir('scr-vin');
        }

        function mostrarHistorial() {
            const cont = document.getElementById('lista-cargas'); cont.innerHTML = "";
            let db = JSON.parse(localStorage.getItem('autolog_barcode') || '[]');
            db.reverse().forEach(c => {
                cont.innerHTML += `<div class="load-card"><b>ECO: ${c.eco}</b><br>VIN: ${c.danos[0].vin}</div>`;
            });
        }
    </script>
</body>
</html>
