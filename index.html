<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AutoLog V18.1 - Edit Mode</title>
    <style>
        :root { --blue: #0A84FF; --bg: #000; --card: #1C1C1E; --red: #FF453A; --gray: #8E8E93; --green: #32D74B; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        
        .screen { display: none; padding: 20px; height: 100vh; box-sizing: border-box; flex-direction: column; }
        .active { display: flex; }
        
        .btn { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-size: 17px; font-weight: 600; margin: 8px 0; cursor: pointer; }
        .btn-green { background: var(--green); color: black; }
        .btn-cancel { background: #333; color: var(--red); }
        .btn-back { background: transparent; color: var(--blue); border:none; font-size: 16px; font-weight: bold; padding: 10px 0; text-align: left; }

        input, textarea { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #1c1c1e; color: white; font-size: 18px; box-sizing: border-box; }
        
        /* Código Interactivo */
        #display-code { 
            font-size: 50px; 
            font-weight: 800; 
            color: var(--red); 
            text-align: center; 
            padding: 15px; 
            border: 2px solid var(--red); 
            border-radius: 18px; 
            margin: 10px 0; 
            background: #111; 
            letter-spacing: 5px;
            cursor: pointer; /* Indica que es clickable */
            transition: transform 0.1s;
        }
        #display-code:active { transform: scale(0.95); background: #222; }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; }
        .key { background: #2C2C2E; color: white; padding: 20px; border-radius: 12px; text-align: center; font-size: 24px; font-weight: bold; border: 1px solid #444; }
        .key:active { background: var(--blue); }
        
        .load-card { background: var(--card); padding: 15px; border-radius: 18px; margin-bottom: 12px; border-left: 5px solid var(--blue); }
        .note-tag { color: var(--red); font-weight: bold; }
        .history-note { font-size: 13px; color: var(--gray); font-style: italic; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="scr-home" class="screen active">
        <h1 style="margin-top: 40px; font-size: 32px;">AutoLog V18.1</h1>
        <p style="color: var(--gray);">Codificación con Corrección Táctil</p>
        <div style="margin-top: auto;">
            <button class="btn" onclick="ir('scr-pin')">➕ Nueva Inspección</button>
            <button class="btn btn-cancel" style="color:white" onclick="ir('scr-history')">🔍 Ver Historial</button>
        </div>
    </div>

    <div id="scr-pin" class="screen">
        <button class="btn-back" onclick="ir('scr-home')">← Regresar</button>
        <div style="text-align: center; margin-top: 50px;">
            <h2>PIN de Seguridad</h2>
            <input type="tel" id="pin-input" maxlength="3" style="font-size:40px; text-align:center; letter-spacing:10px;">
            <button class="btn" onclick="checkPin()">Entrar</button>
        </div>
    </div>

    <div id="scr-setup" class="screen">
        <button class="btn-back" onclick="ir('scr-home')">← Cancelar</button>
        <h2>Configuración</h2>
        <input type="text" id="inspector" placeholder="Inspector">
        <input type="text" id="operador" placeholder="Operador">
        <input type="text" id="eco" placeholder="ECO">
        <button class="btn" onclick="validarSetup()">Confirmar</button>
    </div>

    <div id="scr-vin" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button class="btn-back" onclick="ir('scr-setup')">← Datos</button>
            <button class="btn-back" style="color:var(--red)" onclick="confirmarSalida()">Terminar Captura ✖</button>
        </div>
        <h2>VIN del Vehículo</h2>
        <input type="text" id="vin-input" maxlength="17" placeholder="Escribir VIN..." style="text-align:center; font-family:monospace;" oninput="this.value=this.value.toUpperCase(); actVinBtn();">
        <button id="btn-to-inspect" class="btn" style="opacity:0.4" disabled onclick="ir('scr-inspect')">Siguiente</button>
    </div>

    <div id="scr-inspect" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button class="btn-back" onclick="ir('scr-vin')">← Cambiar VIN</button>
            <span id="hint-edit" style="font-size:10px; color:var(--gray); display:none;">Toca el código para editar</span>
        </div>

        <div id="display-code" onclick="editarCodigo()">00-00-0</div>
        
        <div id="section-keypad">
            <div class="keypad">
                <div class="key" onclick="pressKey(1)">1</div><div class="key" onclick="pressKey(2)">2</div><div class="key" onclick="pressKey(3)">3</div>
                <div class="key" onclick="pressKey(4)">4</div><div class="key" onclick="pressKey(5)">5</div><div class="key" onclick="pressKey(6)">6</div>
                <div class="key" onclick="pressKey(7)">7</div><div class="key" onclick="pressKey(8)">8</div><div class="key" onclick="pressKey(9)">9</div>
                <div class="key" style="background:#444" onclick="resetKeys()">C</div><div class="key" onclick="pressKey(0)">0</div>
                <div class="key" style="background:var(--blue)" onclick="confirmarCodigo()">OK</div>
            </div>
        </div>

        <div id="section-details" style="display:none;">
            <textarea id="nota-inspeccion" placeholder="Escribe aquí los detalles del daño..."></textarea>
            <button class="btn btn-green" onclick="guardarDano()">✅ CAPTURAR DAÑO</button>
            <button class="btn" style="background:#222; border:1px solid var(--blue)" onclick="siguienteVin()">🏁 SIGUIENTE VIN</button>
        </div>
    </div>

    <div id="scr-history" class="screen">
        <button class="btn-back" onclick="ir('scr-home')">← Inicio</button>
        <h2>Historial Local</h2>
        <div id="history-list" style="overflow-y:auto; flex:1;"></div>
    </div>

    <script>
        let session = { eco: "", op: "", insp: "" };
        let currentDigits = []; 

        function ir(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'scr-history') renderHistorial();
        }

        function checkPin() {
            if(document.getElementById('pin-input').value === '123') ir('scr-setup');
            else alert("PIN Incorrecto");
        }

        function validarSetup() {
            session.eco = document.getElementById('eco').value;
            session.op = document.getElementById('operador').value;
            session.insp = document.getElementById('inspector').value;
            if(!session.eco) return alert("ECO requerido");
            ir('scr-vin');
        }

        function actVinBtn() {
            const len = document.getElementById('vin-input').value.length;
            const btn = document.getElementById('btn-to-inspect');
            btn.disabled = len !== 17;
            btn.style.opacity = len === 17 ? "1" : "0.4";
        }

        function confirmarSalida() {
            if(confirm("¿Seguro que quieres salir? Se perderán los datos de esta carga.")) {
                location.reload();
            }
        }

        function pressKey(num) {
            if(currentDigits.length < 5) {
                currentDigits.push(num);
                updateDisplay();
            }
        }

        function resetKeys() {
            currentDigits = [];
            editarCodigo(); // Regresa al teclado y limpia display
            updateDisplay();
        }

        function updateDisplay() {
            let d = [...currentDigits];
            while(d.length < 5) d.push(0);
            document.getElementById('display-code').innerText = `${d[0]}${d[1]}-${d[2]}${d[3]}-${d[4]}`;
        }

        function confirmarCodigo() {
            if(currentDigits.length < 5) return alert("Código incompleto (5 dígitos)");
            document.getElementById('section-keypad').style.display = 'none';
            document.getElementById('section-details').style.display = 'block';
            document.getElementById('hint-edit').style.display = 'block';
        }

        // --- FUNCIÓN NUEVA: VOLVER AL TECLADO SIN BORRAR ---
        function editarCodigo() {
            document.getElementById('section-keypad').style.display = 'block';
            document.getElementById('section-details').style.display = 'none';
            document.getElementById('hint-edit').style.display = 'none';
        }

        function guardarDano() {
            const code = document.getElementById('display-code').innerText;
            const nota = document.getElementById('nota-inspeccion').value;
            
            const entry = {
                vin: document.getElementById('vin-input').value,
                code: code,
                nota: nota,
                hora: new Date().toLocaleTimeString(),
                fecha: new Date().toLocaleDateString()
            };

            let db = JSON.parse(localStorage.getItem('autolog_v18_db') || '[]');
            let idx = db.findIndex(c => c.eco === session.eco);
            
            if(idx > -1) db[idx].danos.push(entry);
            else db.push({ eco: session.eco, op: session.op, danos: [entry], fecha: entry.fecha });

            localStorage.setItem('autolog_v18_db', JSON.stringify(db));
            alert("✅ Daño Guardado");
            
            currentDigits = [];
            document.getElementById('nota-inspeccion').value = "";
            editarCodigo();
            updateDisplay();
        }

        function siguienteVin() {
            document.getElementById('vin-input').value = "";
            actVinBtn();
            currentDigits = [];
            editarCodigo();
            updateDisplay();
            ir('scr-vin');
        }

        function renderHistorial() {
            const list = document.getElementById('history-list'); list.innerHTML = "";
            let db = JSON.parse(localStorage.getItem('autolog_v18_db') || '[]');
            db.reverse().forEach(c => {
                let card = `<div class="load-card"><b>ECO: ${c.eco}</b> <small>(${c.fecha})</small><br>`;
                c.danos.forEach(d => {
                    let marc = d.nota ? ' <span class="note-tag">*</span>' : '';
                    card += `<div style="margin-top:5px; font-size:14px;">• ${d.vin} | ${d.code}${marc}</div>`;
                    if(d.nota) card += `<div class="history-note">Nota: ${d.nota}</div>`;
                });
                card += `</div>`;
                list.innerHTML += card;
            });
        }
    </script>
</body>
</html>
